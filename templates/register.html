<!DOCTYPE html>
<html>
<head>
  <title>Student Register</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'index.css' %}" />
</head>

<body>
  <div class="formbold-main-wrapper">
    <div class="formbold-form-wrapper">
      <img src="{% static 'img/regsiter.png' %}" />

      <form method="POST">
        {% csrf_token %}

        <div class="formbold-form-title">
            <h2>Student Registration</h2>
            <p>Please fill in your details below.</p>
        </div>

        <!-- First Name & Last Name -->
        <div class="formbold-input-flex">
            <div>
            <label class="formbold-form-label">First Name</label>
            <input type="text" name="fname" class="formbold-form-input" required>
            </div>
            <div>
            <label class="formbold-form-label">Last Name</label>
            <input type="text" name="lname" class="formbold-form-input" required>
            </div>
        </div>

        <!-- Roll No & Program -->
        <div class="formbold-input-flex">
            <div>
            <label class="formbold-form-label">Roll No</label>
            <input type="text" name="roll_no" class="formbold-form-input" required>
            </div>
            <div class="formbold-mb-3">
              <label class="formbold-form-label">Program</label>
              <select name="program" class="formbold-form-input" required>
                <option value="" disabled selected>Select Program</option>
                <option value="AI">Artificial Intelligence (AI)</option>
                <option value="TN">Telecommunication (TN)</option>
                <option value="CS">Computer Science (CS)</option>
                <option value="SE">Software Engineering (SE)</option>
              </select>
            </div>
        </div>

        <!-- Section -->
        <div class="formbold-mb-3">
            <label class="formbold-form-label">Section</label>
            <input type="text" name="section" class="formbold-form-input" required>
        </div>

        <!-- Email -->
        <div class="formbold-mb-3">
            <label class="formbold-form-label">Email</label>
            <input type="email" name="email" class="formbold-form-input" required>
        </div>

        <!-- Phone (Second Last) -->
        <div class="formbold-mb-3">
            <label class="formbold-form-label">Phone Number</label>
            <input type="text" name="phone_no" class="formbold-form-input" required>
        </div>

        <!-- Password (Last) -->
        <div class="formbold-mb-3">
            <label class="formbold-form-label">Password</label>
            <input type="password" name="password" class="formbold-form-input" required>
        </div>

        <button type="submit" class="formbold-btn">Register Now</button>

        <p class="formbold-already">Already have an account? <a href="/login">Login here</a></p>

        {% if success %}
          <p class="message-success">{{ success }}</p>
        {% endif %}

        {% if error %}
          <p class="message-error">{{ error }}</p>
        {% endif %}


        </form>

    </div>
  </div>
</body>
</html>
